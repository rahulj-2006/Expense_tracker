services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: '956791'
      MYSQL_DATABASE: 'expense_app'
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=vegeta_is_here
      - MYSQL_HOST=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=956791
      - MYSQL_DATABASE=expense_app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:4000/api
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  db_data:
